services:
  postgres-db:
    image: postgres:15.3
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_ROOT_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_DB_PATH}:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "root", "-d", "${POSTGRES_DB}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
  qdrant-vector-db:
    image: qdrant/qdrant:latest
    container_name: qdrant_service
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
  postgres_data:

networks:
  backend: